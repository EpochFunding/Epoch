<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" font-family="'Inter','Segoe UI','Arial',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050a0a"/>
      <stop offset="100%" stop-color="#030808"/>
    </linearGradient>
    <linearGradient id="posZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="negZone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.12"/>
    </linearGradient>
  </defs>
  <rect width="720" height="420" fill="url(#bg)"/>

  <!-- header -->
  <text x="36" y="28" fill="#2dd4bf" font-size="18" font-weight="700">Epoch</text>
  <text x="110" y="28" fill="#334155" font-size="13">SOL-PERP · 24h funding rate</text>
  <rect x="560" y="12" width="140" height="24" rx="12" fill="#1a0a0a"/>
  <text x="630" y="28" fill="#f87171" font-size="11" font-weight="700" text-anchor="middle">EXTREME: +142% ann</text>

  <!-- chart area -->
  <rect x="56" y="50" width="628" height="240" fill="none"/>
  <!-- zero line -->
  <line x1="56" y1="170" x2="684" y2="170" stroke="#1e3a5f" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="42" y="174" fill="#1e3a5f" font-size="10" text-anchor="end">0%</text>

  <!-- positive zone fill (above zero) -->
  <rect x="56" y="50" width="628" height="120" fill="url(#posZone)"/>
  <!-- negative zone fill (below zero) -->
  <rect x="56" y="170" width="628" height="120" fill="url(#negZone)"/>

  <!-- y-axis labels -->
  <text x="42" y="58" fill="#ef4444" font-size="10" text-anchor="end">+2%</text>
  <text x="42" y="114" fill="#ef4444" font-size="10" text-anchor="end">+1%</text>
  <text x="42" y="230" fill="#22c55e" font-size="10" text-anchor="end">-1%</text>
  <text x="42" y="286" fill="#22c55e" font-size="10" text-anchor="end">-2%</text>

  <!-- grid lines -->
  <line x1="56" y1="54" x2="684" y2="54" stroke="#0a1f1f" stroke-width="1"/>
  <line x1="56" y1="110" x2="684" y2="110" stroke="#0a1f1f" stroke-width="1"/>
  <line x1="56" y1="230" x2="684" y2="230" stroke="#0a1f1f" stroke-width="1"/>
  <line x1="56" y1="286" x2="684" y2="286" stroke="#0a1f1f" stroke-width="1"/>

  <!-- funding rate line — mostly low positive, spike at end -->
  <!-- Points: x goes 56→684 over 24 hours, y centered at 170 (0%) -->
  <!-- Simulate: mostly 0.1–0.3% positive, brief dip negative around hour 12, then spike to 1.8% at end -->
  <polyline
    points="56,162 83,159 110,165 137,160 164,157 191,163 218,158 245,166 272,152 299,148 326,160 353,172 380,178 407,174 434,168 461,155 488,148 515,138 542,120 569,95 596,78 623,62 650,55 677,54 684,54"
    fill="none"
    stroke="#f87171"
    stroke-width="2.5"
    stroke-linejoin="round"
  />
  <!-- spike highlight at end -->
  <circle cx="684" cy="54" r="5" fill="#ef4444"/>
  <line x1="684" y1="54" x2="684" y2="290" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="680" y="44" fill="#ef4444" font-size="11" font-weight="700" text-anchor="end">1.82%/hr NOW</text>

  <!-- time labels -->
  <text x="56"  y="308" fill="#1e3a5f" font-size="10">-24h</text>
  <text x="247" y="308" fill="#1e3a5f" font-size="10">-16h</text>
  <text x="437" y="308" fill="#1e3a5f" font-size="10">-8h</text>
  <text x="672" y="308" fill="#2dd4bf" font-size="10">now</text>

  <!-- market table below -->
  <rect x="36" y="324" width="648" height="24" rx="0" fill="#030e0e"/>
  <rect x="36" y="324" width="648" height="1" fill="#0a2020"/>
  <text x="56"  y="340" fill="#475569" font-size="11" font-weight="600">MARKET</text>
  <text x="200" y="340" fill="#475569" font-size="11" font-weight="600">HOURLY</text>
  <text x="310" y="340" fill="#475569" font-size="11" font-weight="600">ANNUALIZED</text>
  <text x="450" y="340" fill="#475569" font-size="11" font-weight="600">DIRECTION</text>
  <text x="600" y="340" fill="#475569" font-size="11" font-weight="600">OI SKEW</text>

  <text x="56"  y="360" fill="#e2e8f0" font-size="12" font-weight="600">SOL-PERP</text>
  <text x="200" y="360" fill="#f87171" font-size="12">+1.82%</text>
  <text x="310" y="360" fill="#f87171" font-size="12" font-weight="700">+142%</text>
  <text x="450" y="360" fill="#f87171" font-size="11">longs pay</text>
  <text x="600" y="360" fill="#64748b" font-size="11">L +12%</text>

  <text x="56"  y="380" fill="#94a3b8" font-size="12">BTC-PERP</text>
  <text x="200" y="380" fill="#f87171" font-size="12">+0.24%</text>
  <text x="310" y="380" fill="#f87171" font-size="12">+18%</text>
  <text x="450" y="380" fill="#f87171" font-size="11">longs pay</text>
  <text x="600" y="380" fill="#64748b" font-size="11">balanced</text>

  <text x="56"  y="400" fill="#94a3b8" font-size="12">JTO-PERP</text>
  <text x="200" y="400" fill="#4ade80" font-size="12">-0.38%</text>
  <text x="310" y="400" fill="#4ade80" font-size="12">-29%</text>
  <text x="450" y="400" fill="#4ade80" font-size="11">shorts pay</text>
  <text x="600" y="400" fill="#64748b" font-size="11">S +8%</text>
</svg>
